<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SHEIBIS · Tienda Premium</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #05080e;
            --secondary: #0a101c;
            --accent: #5fa8d3;
            --gold: #d4af37;
            --gold-light: #f5d78e;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f5d78e, #d4af37);
            --text-light: #f0f4fa;
            --text-muted: #8e9fb1;
            --shadow-premium: 0 30px 80px -20px rgba(0, 0, 0, 0.9);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', system-ui, sans-serif;
            --card-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            background: var(--primary);
            font-family: var(--font-sans);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           FONDO DINÁMICO PREMIUM
           ============================================================ */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .bg-canvas .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            animation: orbFloat 28s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 700px;
            height: 700px;
            top: -20%;
            left: -15%;
            background: radial-gradient(circle, #2b4b6e, transparent 70%);
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            bottom: -20%;
            right: -15%;
            background: radial-gradient(circle, #6f4f2b, transparent 70%);
            animation-duration: 34s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            top: 30%;
            left: 55%;
            background: radial-gradient(circle, #3a6a8f, transparent 70%);
            animation-duration: 22s;
            opacity: 0.05;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -40px) scale(1.1); }
        }

        .particle-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                radial-gradient(circle at 80% 60%, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                radial-gradient(circle at 40% 90%, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
            background-size: 80px 80px, 120px 120px, 60px 60px;
            pointer-events: none;
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 12px; opacity: 0.3; }

        /* ============================================================
           SPLASH SCREEN — ANIMACIÓN DE ENTRADA (3 segundos)
           ============================================================ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #splash.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: splashEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes splashEntrance {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            60% { transform: scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .splash-img {
            height: 280px;
            width: 280px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 0 60px rgba(212, 175, 55, 0.08)) drop-shadow(0 0 120px rgba(95, 168, 211, 0.04));
            animation: splashFloat 3s ease-in-out infinite;
        }

        @keyframes splashFloat {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .splash-loader {
            margin-top: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid var(--gold);
            animation: spinLoader 1s linear infinite;
            opacity: 0.3;
        }

        @keyframes spinLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================================
           TOP BAR — ESTILO AMAZON
           ============================================================ */
        .top-bar {
            background: rgba(7, 11, 18, 0.9);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            padding: 0.6rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-img-top {
            height: 35px;
            width: 35px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.08));
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-img-top:hover {
            transform: scale(1.06);
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.15));
        }

        .brand-name {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transition: all 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
        }

        .search-bar input {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            color: #fff;
            font-size: 0.85rem;
            flex: 1;
            outline: none;
            font-family: var(--font-sans);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
            opacity: 0.4;
        }

        .search-bar button {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            color: var(--gold);
        }

        .cart-top-btn {
            background: rgba(34, 197, 94, 0.8);
            backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }

        .cart-top-btn:hover {
            transform: scale(1.04);
            background: rgba(34, 197, 94, 0.95);
        }

        /* ============================================================
           CATEGORÍAS — ESTILO AMAZON (scroll horizontal)
           ============================================================ */
        .categories-bar {
            display: flex;
            gap: 0.3rem 1.2rem;
            padding: 0.6rem 2rem;
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .categories-bar::-webkit-scrollbar {
            display: none;
        }

        .categories-bar .cat-item {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.3rem 0.2rem;
            border-bottom: 2px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .categories-bar .cat-item i {
            color: var(--accent);
            font-size: 0.75rem;
            opacity: 0.4;
            transition: 0.3s;
        }

        .categories-bar .cat-item:hover {
            color: #ffffff;
            border-bottom-color: var(--accent);
        }

        .categories-bar .cat-item:hover i { opacity: 0.8; }

        .categories-bar .cat-item.active {
            color: #ffffff;
            border-bottom-color: var(--gold);
        }

        .categories-bar .cat-item.active i {
            opacity: 1;
            color: var(--gold);
        }

        /* ============================================================
           PRODUCTOS — ESTILO AMAZON (cuadros en scroll horizontal)
           ============================================================ */
        .product-section {
            padding: 1.5rem 2rem;
        }

        .product-section-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #fff;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .product-section-title span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .product-scroll {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            padding: 0.5rem 0.2rem 1.5rem;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .product-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .product-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        .product-scroll::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
            opacity: 0.3;
        }

        .product-card {
            min-width: 200px;
            max-width: 220px;
            flex-shrink: 0;
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.2rem 1rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            scroll-snap-align: start;
            position: relative;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.04), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .product-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold-gradient);
            opacity: 0;
            transition: 0.4s;
            border-radius: 16px 16px 0 0;
        }

        .product-card:hover::after { opacity: 1; }

        .product-card:hover {
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.035);
        }

        .product-card .product-icon {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            transition: 0.4s;
            opacity: 0.5;
            display: block;
        }

        .product-card:hover .product-icon {
            opacity: 0.9;
            transform: scale(1.05) translateY(-2px);
        }

        .product-card .product-name {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
            color: #f0f4fa;
            line-height: 1.2;
            min-height: 2.4rem;
        }

        .product-card .product-desc {
            color: var(--text-muted);
            font-size: 0.7rem;
            opacity: 0.5;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            min-height: 2.2rem;
        }

        .product-card .product-price {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
            letter-spacing: -0.02em;
        }

        .product-card .product-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 0.1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .qty-display {
            min-width: 18px;
            text-align: center;
            font-weight: 600;
            color: #fff;
            font-size: 0.8rem;
        }

        .btn-add {
            background: var(--gold-gradient);
            color: #070b12;
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.08);
            min-height: 32px;
        }

        .btn-add:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.18);
        }

        .btn-add.added {
            background: #22c55e;
            color: #fff;
        }

        /* ============================================================
           CARRITO DESPLEGABLE
           ============================================================ */
        #cart {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 360px;
            max-height: 78vh;
            background: rgba(10, 16, 26, 0.97);
            backdrop-filter: blur(32px) saturate(1.8);
            -webkit-backdrop-filter: blur(32px) saturate(1.8);
            padding: 22px;
            border-radius: 20px;
            box-shadow: var(--shadow-premium), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            display: none;
            z-index: 1200;
            border: 1px solid rgba(255, 255, 255, 0.03);
            overflow-y: auto;
        }

        #cart.active {
            display: block;
            animation: cartSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cartSlide {
            0% { opacity: 0; transform: translateY(12px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #cart h3 {
            margin: 0 0 16px 0;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #cart h3 i { color: var(--gold); }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item .item-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #d6e2f0;
            flex: 1;
        }

        .cart-item .item-price {
            font-weight: 700;
            color: var(--gold);
            margin-right: 8px;
            font-size: 0.85rem;
        }

        .cart-item .item-remove {
            background: none;
            border: none;
            color: #7f8fa3;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 4px;
            transition: 0.2s;
        }

        .cart-item .item-remove:hover { color: #ff6b6b; }

        .cart-total {
            font-weight: 800;
            text-align: right;
            margin-top: 16px;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .cart-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        .btn {
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: #070b12;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.15);
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.25);
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.06);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.06);
        }

        .btn-danger:hover { background: rgba(255, 107, 107, 0.12); }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            padding: 2rem 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.015);
            text-align: center;
        }

        .footer p {
            color: var(--text-muted);
            font-size: 0.8rem;
            opacity: 0.2;
        }

        .footer p i {
            color: var(--gold);
            opacity: 0.3;
            margin: 0 0.3rem;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 820px) {
            .top-bar { padding: 0.5rem 1.2rem; flex-wrap: wrap; justify-content: center; }
            .search-bar { max-width: 100%; order: 3; flex-basis: 100%; }
            .brand-name { font-size: 1.1rem; }
            .logo-img-top { height: 30px; width: 30px; }
            .cart-top-btn { padding: 6px 14px; font-size: 0.65rem; }
            #cart { width: 92vw; right: 4vw; top: 76px; padding: 18px; }
            .categories-bar { padding: 0.4rem 1rem; gap: 0.3rem 0.8rem; }
            .categories-bar .cat-item { font-size: 0.6rem; }
            .product-section { padding: 1rem; }
            .product-section-title { font-size: 1.3rem; }
            .product-card { min-width: 160px; padding: 1rem 0.8rem; }
            .product-card .product-icon { font-size: 2.2rem; }
            .product-card .product-name { font-size: 0.8rem; min-height: 2rem; }
            .product-card .product-price { font-size: 1rem; }
            .splash-img { height: 200px; width: 200px; }
        }

        @media (max-width: 480px) {
            .product-card { min-width: 140px; padding: 0.8rem 0.6rem; }
            .product-card .product-icon { font-size: 1.8rem; }
            .product-card .product-name { font-size: 0.7rem; min-height: 1.8rem; }
            .product-card .product-desc { font-size: 0.6rem; min-height: 1.6rem; }
            .product-card .product-price { font-size: 0.9rem; }
            .qty-btn { width: 20px; height: 20px; font-size: 0.6rem; }
            .qty-display { font-size: 0.7rem; min-width: 14px; }
            .btn-add { font-size: 0.55rem; padding: 0.3rem 0.4rem; min-height: 26px; }
            .splash-img { height: 150px; width: 150px; }
            .splash-loader { width: 40px; height: 40px; }
            .product-section-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    SPLASH SCREEN — ANIMACIÓN DE ENTRADA (3 segundos)
    ============================================================ -->
    <div id="splash">
        <div class="splash-content">
            <img src="https://cdn.phototourl.com/free/2026-06-30-894a18ad-2214-4ace-ac1d-e14c8412f777.jpg" alt="SHEIBIS" class="splash-img" loading="lazy">
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- ============================================================
    FONDO PREMIUM
    ============================================================ -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="particle-grid"></div>

    <!-- ============================================================
    TOP BAR — ESTILO AMAZON
    ============================================================ -->
    <header class="top-bar">
        <div class="logo-area">
            <img src="https://cdn.phototourl.com/free/2026-06-30-894a18ad-2214-4ace-ac1d-e14c8412f777.jpg" alt="SHEIBIS" class="logo-img-top" loading="lazy">
            <span class="brand-name">SHEIBIS</span>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="Buscar productos..." id="searchInput">
            <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
        </div>

        <button class="cart-top-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span>
        </button>
    </header>

    <!-- ============================================================
    CATEGORÍAS — scroll horizontal
    ============================================================ -->
    <div class="categories-bar" id="categoryBar">
        <a href="#" class="cat-item active" data-cat="todos"><i class="fas fa-th-large"></i> Todos</a>
        <a href="#" class="cat-item" data-cat="audifonos"><i class="fas fa-headphones"></i> Audífonos</a>
        <a href="#" class="cat-item" data-cat="relojes"><i class="fas fa-clock"></i> Smartwatches</a>
        <a href="#" class="cat-item" data-cat="cargadores"><i class="fas fa-bolt"></i> Cargadores</a>
        <a href="#" class="cat-item" data-cat="powerbanks"><i class="fas fa-battery-full"></i> Power Banks</a>
        <a href="#" class="cat-item" data-cat="bocinas"><i class="fas fa-volume-up"></i> Bocinas</a>
        <a href="#" class="cat-item" data-cat="camaras"><i class="fas fa-camera"></i> Cámaras</a>
        <a href="#" class="cat-item" data-cat="cables"><i class="fas fa-plug"></i> Cables</a>
        <a href="#" class="cat-item" data-cat="fundas"><i class="fas fa-mobile-alt"></i> Fundas</a>
        <a href="#" class="cat-item" data-cat="soportes"><i class="fas fa-grip"></i> Soportes</a>
        <a href="#" class="cat-item" data-cat="impresoras"><i class="fas fa-print"></i> Impresoras</a>
    </div>

    <!-- ============================================================
    PRODUCTOS — scroll horizontal estilo Amazon
    ============================================================ -->
    <div class="product-section">
        <h2 class="product-section-title">Productos <span>Destacados</span></h2>
        <div class="product-scroll" id="productScroll"></div>
    </div>

    <!-- ============================================================
    FOOTER
    ============================================================ -->
    <footer class="footer">
        <p><i class="fas fa-heart"></i> Hecho con precisión para amantes de la tecnología</p>
        <p style="margin-top:0.5rem; font-size:0.7rem; opacity:0.15;">© 2026 SHEIBIS</p>
    </footer>

    <!-- ============================================================
    CARRITO DESPLEGABLE
    ============================================================ -->
    <div id="cart">
        <h3><i class="fas fa-crown"></i> Tu carrito</h3>
        <div id="cartItems"></div>
        <div class="cart-total">Total: Q<span id="cartTotal">0.00</span></div>
        <div class="cart-actions">
            <button class="btn btn-danger" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Vaciar</button>
            <button class="btn btn-primary" onclick="checkout()"><i class="fas fa-arrow-right"></i> Pagar</button>
        </div>
    </div>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        (function() {
            // ============================================================
            //  SPLASH — 3 segundos
            // ============================================================
            const splash = document.getElementById('splash');
            setTimeout(() => {
                splash.classList.add('hidden');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 3000);

            // ============================================================
            //  PRODUCTOS
            // ============================================================
            const products = [
                // Audífonos Bluetooth
                { id: 1, nombre: "Audífonos Pro X1", precio: 450, icono: "fa-headphones", categoria: "audifonos",
                desc: "Cancelación de ruido · 40h" },
                { id: 2, nombre: "Audífonos Ultra Bass", precio: 320, icono: "fa-headphones", categoria: "audifonos",
                    desc: "Bajos profundos · 5.2" },
                { id: 3, nombre: "Audífonos Studio Pro", precio: 680, icono: "fa-headphones", categoria: "audifonos",
                    desc: "Sonido envolvente" },
                { id: 4, nombre: "Audífonos Sports Fit", precio: 250, icono: "fa-headphones", categoria: "audifonos",
                    desc: "Resistentes al agua" },
                { id: 5, nombre: "Audífonos Elite", precio: 550, icono: "fa-headphones", categoria: "audifonos",
                    desc: "Alta fidelidad · 50h" },

                // Smartwatches
                { id: 6, nombre: "SmartWatch Ultra", precio: 850, icono: "fa-clock", categoria: "relojes",
                    desc: "GPS · Cardíaco · 7 días" },
                { id: 7, nombre: "SmartWatch Fit", precio: 420, icono: "fa-clock", categoria: "relojes",
                    desc: "Deporte · 5 ATM" },
                { id: 8, nombre: "SmartWatch Classic", precio: 1200, icono: "fa-clock", categoria: "relojes",
                    desc: "Acero inoxidable" },
                { id: 9, nombre: "SmartWatch Kids", precio: 220, icono: "fa-clock", categoria: "relojes",
                    desc: "GPS · Llamadas" },

                // Cargadores rápidos
                { id: 10, nombre: "Cargador Rápido 65W", precio: 180, icono: "fa-bolt", categoria: "cargadores",
                    desc: "USB-C · Laptop y celular" },
                { id: 11, nombre: "Cargador Inalámbrico", precio: 220, icono: "fa-bolt", categoria: "cargadores",
                    desc: "Qi · Soporte ajustable" },
                { id: 12, nombre: "Cargador Dual 40W", precio: 150, icono: "fa-bolt", categoria: "cargadores",
                    desc: "2 puertos · Carga inteligente" },

                // Power Banks
                { id: 13, nombre: "Power Bank 20000mAh", precio: 350, icono: "fa-battery-full", categoria: "powerbanks",
                    desc: "3 puertos · Pantalla" },
                { id: 14, nombre: "Power Bank Mini", precio: 180, icono: "fa-battery-full", categoria: "powerbanks",
                    desc: "10000mAh · Delgado" },
                { id: 15, nombre: "Power Bank Solar", precio: 420, icono: "fa-battery-full", categoria: "powerbanks",
                    desc: "Carga solar · 25000mAh" },

                // Bocinas Bluetooth
                { id: 16, nombre: "Bocina Boom 360", precio: 580, icono: "fa-volume-up", categoria: "bocinas",
                    desc: "Sonido 360° · Resistente" },
                { id: 17, nombre: "Bocina Party Pro", precio: 890, icono: "fa-volume-up", categoria: "bocinas",
                    desc: "100W · Luces LED" },
                { id: 18, nombre: "Bocina Mini", precio: 180, icono: "fa-volume-up", categoria: "bocinas",
                    desc: "Portátil · 12h" },
                { id: 19, nombre: "Bocina Smart Home", precio: 420, icono: "fa-volume-up", categoria: "bocinas",
                    desc: "Asistente · WiFi" },

                // Cámaras Wi-Fi
                { id: 20, nombre: "Cámara 4K Action", precio: 1200, icono: "fa-camera", categoria: "camaras",
                    desc: "4K 60fps · Estabilización" },
                { id: 21, nombre: "Cámara Web Pro", precio: 350, icono: "fa-camera", categoria: "camaras",
                    desc: "4K · Micrófono dual" },
                { id: 22, nombre: "Cámara 360°", precio: 1800, icono: "fa-camera", categoria: "camaras",
                    desc: "5.7K · Estabilización" },
                { id: 23, nombre: "Cámara Interior", precio: 450, icono: "fa-camera", categoria: "camaras",
                    desc: "1080p · Visión nocturna" },

                // Cables de carga
                { id: 24, nombre: "Cable USB-C Premium", precio: 80, icono: "fa-plug", categoria: "cables",
                    desc: "Trenzado · 2 metros" },
                { id: 25, nombre: "Cable Lightning Pro", precio: 90, icono: "fa-plug", categoria: "cables",
                    desc: "MFi · Trenzado" },
                { id: 26, nombre: "Cable 3 en 1", precio: 120, icono: "fa-plug", categoria: "cables",
                    desc: "USB-C · Lightning · Micro" },

                // Fundas y protectores
                { id: 27, nombre: "Funda Transparente", precio: 120, icono: "fa-mobile-alt", categoria: "fundas",
                    desc: "Anti-amarillamiento" },
                { id: 28, nombre: "Funda Anti-shock", precio: 180, icono: "fa-mobile-alt", categoria: "fundas",
                    desc: "Protección militar" },
                { id: 29, nombre: "Protector de Pantalla", precio: 150, icono: "fa-mobile-alt", categoria: "fundas",
                    desc: "Vidrio 9H · Anti-huellas" },

                // Soportes para celular
                { id: 30, nombre: "Soporte Magnético", precio: 180, icono: "fa-grip", categoria: "soportes",
                    desc: "360° · Antideslizante" },
                { id: 31, nombre: "Soporte Ventilación", precio: 120, icono: "fa-grip", categoria: "soportes",
                    desc: "Sujeción segura" },
                { id: 32, nombre: "Soporte de Mesa", precio: 220, icono: "fa-grip", categoria: "soportes",
                    desc: "Ajuste de altura" },

                // Mini impresoras térmicas
                { id: 33, nombre: "Mini Impresora Térmica", precio: 680, icono: "fa-print", categoria: "impresoras",
                    desc: "Bluetooth · Sin tinta" },
                { id: 34, nombre: "Impresora Portátil", precio: 450, icono: "fa-print", categoria: "impresoras",
                    desc: "Tamaño bolsillo" },
                { id: 35, nombre: "Impresora de Etiquetas", precio: 520, icono: "fa-print", categoria: "impresoras",
                    desc: "Termal · Negocios" },
            ];

            // ============================================================
            //  ESTADO
            // ============================================================
            let cart = [];
            let quantities = {};
            let currentFilter = 'todos';
            let searchTerm = '';

            // ============================================================
            //  DOM REFS
            // ============================================================
            const scrollContainer = document.getElementById('productScroll');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const cartCountEl = document.getElementById('cartCount');
            const cartEl = document.getElementById('cart');
            const categoryLinks = document.querySelectorAll('.cat-item');
            const searchInput = document.getElementById('searchInput');

            // ============================================================
            //  RENDER PRODUCTOS
            // ============================================================
            function renderProducts(filter, search) {
                let filtered = filter === 'todos' ? products : products.filter(p => p.categoria === filter);

                if (search && search.trim() !== '') {
                    const term = search.toLowerCase().trim();
                    filtered = filtered.filter(p =>
                        p.nombre.toLowerCase().includes(term) ||
                        p.desc.toLowerCase().includes(term)
                    );
                }

                scrollContainer.innerHTML = filtered.map(p => {
                    const qty = quantities[p.id] || 1;
                    return `
                        <div class="product-card" data-id="${p.id}">
                            <span class="product-icon"><i class="fas ${p.icono}"></i></span>
                            <div class="product-name">${p.nombre}</div>
                            <div class="product-desc">${p.desc}</div>
                            <div class="product-price">Q ${p.precio}</div>
                            <div class="product-actions">
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="changeQty(${p.id}, -1)"><i class="fas fa-minus"></i></button>
                                    <span class="qty-display" id="qty-${p.id}">${qty}</span>
                                    <button class="qty-btn" onclick="changeQty(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                                </div>
                                <button class="btn-add" onclick="addToCart(${p.id})"><i class="fas fa-plus"></i> Agregar</button>
                            </div>
                        </div>
                    `;
                }).join('');

                // Si no hay productos, mostrar mensaje
                if (scrollContainer.innerHTML === '') {
                    scrollContainer.innerHTML = `
                        <div style="min-width:100%; text-align:center; padding:2rem; color:var(--text-muted); opacity:0.4;">
                            <i class="fas fa-search" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                            No se encontraron productos
                        </div>
                    `;
                }
            }

            // ============================================================
            //  FILTRAR Y BUSCAR
            // ============================================================
            function filterProducts(categoria) {
                currentFilter = categoria;
                renderProducts(categoria, searchTerm);
                categoryLinks.forEach(el => {
                    el.classList.remove('active');
                    if (el.dataset.cat === categoria) el.classList.add('active');
                });
            }

            window.searchProducts = function() {
                searchTerm = searchInput.value;
                renderProducts(currentFilter, searchTerm);
            };

            searchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    searchProducts();
                }
            });

            // ============================================================
            //  CANTIDAD
            // ============================================================
            window.changeQty = function(id, delta) {
                if (!quantities[id]) quantities[id] = 1;
                quantities[id] = Math.max(1, quantities[id] + delta);
                const display = document.getElementById(`qty-${id}`);
                if (display) display.textContent = quantities[id];
            };

            // ============================================================
            //  CARRITO
            // ============================================================
            window.addToCart = function(id) {
                const product = products.find(p => p.id === id);
                if (!product) return;
                const qty = quantities[id] || 1;

                const existing = cart.find(p => p.id === id);
                if (existing) {
                    existing.cantidad += qty;
                } else {
                    cart.push({ ...product, cantidad: qty });
                }

                quantities[id] = 1;
                const display = document.getElementById(`qty-${id}`);
                if (display) display.textContent = 1;

                updateCartUI();

                const btn = document.querySelector(`.product-card[data-id="${id}"] .btn-add`);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Agregado';
                    btn.classList.add('added');
                    setTimeout(() => {
                        btn.innerHTML = orig;
                        btn.classList.remove('added');
                    }, 1200);
                }
            };

            window.removeFromCart = function(id) {
                cart = cart.filter(p => p.id !== id);
                updateCartUI();
            };

            window.toggleCart = function() {
                cartEl.classList.toggle('active');
            };

            window.clearCart = function() {
                cart = [];
                updateCartUI();
                cartEl.classList.remove('active');
            };

            window.checkout = function() {
                if (cart.length === 0) {
                    alert('🛒 Tu carrito está vacío');
                    return;
                }
                const total = cart.reduce((s, i) => s + (i.precio * i.cantidad), 0);
                alert(`✅ Pedido confirmado\nTotal: Q${total.toFixed(2)}\n¡Gracias por tu compra!`);
                clearCart();
            };

            function updateCartUI() {
                let total = 0,
                    count = 0;
                if (cart.length === 0) {
                    cartItemsEl.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:1.2rem 0;">Carrito vacío</p>';
                } else {
                    cartItemsEl.innerHTML = cart.map(item => {
                        total += item.precio * item.cantidad;
                        count += item.cantidad;
                        return `
                            <div class="cart-item">
                                <div class="item-name">${item.nombre} x${item.cantidad}</div>
                                <div>
                                    <span class="item-price">Q${(item.precio * item.cantidad).toFixed(2)}</span>
                                    <button class="item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                cartTotalEl.textContent = total.toFixed(2);
                cartCountEl.textContent = count;
            }

            // ============================================================
            //  EVENTOS CATEGORÍA
            // ============================================================
            categoryLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const cat = this.dataset.cat;
                    filterProducts(cat);
                });
            });

            // ============================================================
            //  CERRAR CARRITO
            // ============================================================
            document.addEventListener('click', (e) => {
                const toggle = document.querySelector('.cart-top-btn');
                if (cartEl.classList.contains('active') && !cartEl.contains(e.target) && !toggle.contains(e.target)) {
                    cartEl.classList.remove('active');
                }
            });

            // ============================================================
            //  INICIO
            // ============================================================
            renderProducts('todos', '');
            updateCartUI();
            document.querySelector('.cat-item[data-cat="todos"]')?.classList.add('active');

            console.log('✦ SHEIBIS — Tienda estilo Amazon con scroll horizontal');
        })();
    </script>
</body>
</html>
