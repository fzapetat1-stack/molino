<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SHEIBIS</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #05080e;
            --secondary: #0a101c;
            --accent: #5fa8d3;
            --gold: #d4af37;
            --gold-light: #f5d78e;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f5d78e, #d4af37);
            --text-light: #f0f4fa;
            --text-muted: #8e9fb1;
            --shadow-premium: 0 30px 80px -20px rgba(0, 0, 0, 0.9);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--primary);
            font-family: var(--font-sans);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           FONDO DINÁMICO
           ============================================================ */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .bg-canvas .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: orbFloat 28s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 700px;
            height: 700px;
            top: -20%;
            left: -15%;
            background: radial-gradient(circle, #2b4b6e, transparent 70%);
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            bottom: -20%;
            right: -15%;
            background: radial-gradient(circle, #6f4f2b, transparent 70%);
            animation-duration: 34s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            top: 30%;
            left: 55%;
            background: radial-gradient(circle, #3a6a8f, transparent 70%);
            animation-duration: 22s;
            opacity: 0.06;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -40px) scale(1.1); }
        }

        .particle-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                radial-gradient(circle at 80% 60%, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                radial-gradient(circle at 40% 90%, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
            background-size: 80px 80px, 120px 120px, 60px 60px;
            pointer-events: none;
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 12px; opacity: 0.3; }

        /* ============================================================
           SPLASH SCREEN — 3 segundos
           ============================================================ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #splash.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: splashEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes splashEntrance {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            60% { transform: scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .splash-logo-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* LOGO ESTÁTICO */
        .splash-img {
            height: 280px;
            width: 280px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            z-index: 2;
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.08)) drop-shadow(0 0 80px rgba(212, 175, 55, 0.03));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-img:hover {
            transform: scale(1.04);
            filter: drop-shadow(0 0 60px rgba(212, 175, 55, 0.15)) drop-shadow(0 0 120px rgba(212, 175, 55, 0.06));
        }

        .splash-loader {
            margin-top: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid var(--gold);
            animation: spinLoader 1s linear infinite;
            opacity: 0.3;
        }

        @keyframes spinLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        .top-bar {
            background: rgba(7, 11, 18, 0.7);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            padding: 0.5rem 3.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* LOGO ESTÁTICO */
        .logo-img-top {
            height: 40px;
            width: 40px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.08));
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-wrapper:hover .logo-img-top {
            transform: scale(1.06);
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.15));
        }

        /* ============================================================
           CARRITO FLOTANTE
           ============================================================ */
        #cartToggle {
            position: fixed;
            top: 24px;
            right: 28px;
            z-index: 1200;
            background: rgba(34, 197, 94, 0.8);
            backdrop-filter: blur(12px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 12px 40px rgba(34, 197, 94, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.3px;
        }

        #cartToggle:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 20px 60px rgba(34, 197, 94, 0.25);
            background: rgba(34, 197, 94, 0.92);
        }

        #cartToggle i { font-size: 1.1rem; }

        /* ============================================================
           CARRITO DESPLEGABLE
           ============================================================ */
        #cart {
            position: fixed;
            right: 28px;
            top: 88px;
            width: 380px;
            max-height: 78vh;
            background: rgba(10, 16, 26, 0.96);
            backdrop-filter: blur(32px) saturate(1.8);
            padding: 26px 24px;
            border-radius: 28px;
            box-shadow: var(--shadow-premium), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            display: none;
            z-index: 1200;
            border: 1px solid rgba(255, 255, 255, 0.03);
            overflow-y: auto;
        }

        #cart.active {
            display: block;
            animation: cartSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cartSlide {
            0% { opacity: 0; transform: translateY(12px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #cart h3 {
            margin: 0 0 18px 0;
            color: #fff;
            font-weight: 600;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #cart h3 i { color: var(--gold); }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item .item-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #d6e2f0;
        }

        .cart-item .item-price {
            font-weight: 700;
            color: var(--gold);
            margin-right: 8px;
        }

        .cart-item .item-remove {
            background: none;
            border: none;
            color: #7f8fa3;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0 4px;
            transition: 0.2s;
        }

        .cart-item .item-remove:hover { color: #ff6b6b; }

        .cart-total {
            font-weight: 800;
            text-align: right;
            margin-top: 18px;
            font-size: 1.35rem;
            color: var(--gold);
        }

        .cart-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: #070b12;
            box-shadow: 0 6px 24px rgba(212, 175, 55, 0.15);
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 36px rgba(212, 175, 55, 0.25);
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.06);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.06);
        }

        .btn-danger:hover { background: rgba(255, 107, 107, 0.12); }

        /* ============================================================
           HERO — con el logo centrado
           ============================================================ */
        .hero {
            padding: 3.5rem 3rem 2.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-logo-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: heroLogoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes heroLogoIn {
            0% { opacity: 0; transform: scale(0.7) rotate(-8deg); }
            60% { transform: scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* LOGO ESTÁTICO */
        .hero-logo {
            height: 180px;
            width: 180px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.05)) drop-shadow(0 0 80px rgba(212, 175, 55, 0.02));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .hero-logo:hover {
            transform: scale(1.04) rotate(-1deg);
            filter: drop-shadow(0 0 60px rgba(212, 175, 55, 0.12)) drop-shadow(0 0 120px rgba(212, 175, 55, 0.05));
        }

        /* ============================================================
           CATEGORÍAS
           ============================================================ */
        .categories-bar {
            display: flex;
            justify-content: center;
            gap: 0.6rem 2rem;
            flex-wrap: wrap;
            padding: 1.2rem 2rem;
            margin: 0 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
        }

        .categories-bar .cat-item {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.5rem 0.2rem;
            border-bottom: 2px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .categories-bar .cat-item i {
            color: var(--accent);
            font-size: 0.85rem;
            opacity: 0.4;
            transition: 0.3s;
        }

        .categories-bar .cat-item:hover {
            color: #ffffff;
            border-bottom-color: var(--accent);
        }

        .categories-bar .cat-item:hover i { opacity: 0.8; }

        .categories-bar .cat-item.active {
            color: #ffffff;
            border-bottom-color: var(--gold);
        }

        .categories-bar .cat-item.active i {
            opacity: 1;
            color: var(--gold);
        }

        /* ============================================================
           PRODUCT GRID
           ============================================================ */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
            gap: 2rem;
            padding: 2.8rem 3rem 3.5rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.025);
            border-radius: 28px;
            padding: 1.8rem 1.4rem 1.6rem;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            position: relative;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.04), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .product-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold-gradient);
            opacity: 0;
            transition: 0.5s;
            border-radius: 28px 28px 0 0;
        }

        .product-card:hover::after { opacity: 1; }

        .product-card:hover {
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-10px) scale(1.005);
            box-shadow: 0 40px 80px -24px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02);
            background: rgba(255, 255, 255, 0.025);
        }

        .product-card .product-icon {
            font-size: 3.4rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
            transition: 0.5s;
            opacity: 0.4;
            display: inline-block;
        }

        .product-card:hover .product-icon {
            opacity: 0.9;
            transform: scale(1.05) translateY(-4px);
        }

        .product-card .product-name {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 0.2rem;
            color: #f0f4fa;
        }

        .product-card .product-category {
            color: var(--text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.35;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .product-card .product-price {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.45rem;
        }

        .product-card .btn-add {
            background: var(--gold-gradient);
            color: #070b12;
            border: none;
            padding: 0.75rem 1.2rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 1.2rem;
            transition: all 0.3s;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.08);
        }

        .product-card .btn-add:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 36px rgba(212, 175, 55, 0.18);
        }

        .product-card .btn-add i { font-size: 0.8rem; }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            padding: 3rem 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.015);
            text-align: center;
        }

        .footer p {
            color: var(--text-muted);
            font-size: 0.85rem;
            opacity: 0.2;
            font-weight: 400;
        }

        .footer p i {
            color: var(--gold);
            opacity: 0.3;
            margin: 0 0.3rem;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 820px) {
            .top-bar { padding: 0.6rem 1.5rem; }
            .logo-img-top { height: 35px; width: 35px; }
            #cartToggle { padding: 10px 18px; font-size: 0.75rem; top: 16px; right: 16px; gap: 6px; }
            #cart { width: 92vw; right: 4vw; top: 76px; padding: 20px; }
            .hero-logo { height: 130px; width: 130px; }
            .splash-img { height: 200px; width: 200px; }
            .categories-bar { gap: 0.4rem 1.2rem; padding: 0.8rem 0.5rem; margin: 0 0.5rem; overflow-x: auto; flex-wrap: nowrap; justify-content: flex-start; }
            .categories-bar .cat-item { font-size: 0.6rem; white-space: nowrap; padding: 0.3rem 0.4rem; }
            .product-grid { padding: 1.5rem 1.2rem; gap: 1.2rem; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
            .product-card { padding: 1.2rem 0.8rem; border-radius: 22px; }
            .product-card .product-icon { font-size: 2.6rem; }
            .product-card .product-price { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.9rem; padding: 1rem; }
            .product-card { padding: 1rem 0.6rem; border-radius: 18px; }
            .product-card .product-icon { font-size: 2.2rem; }
            .product-card .product-name { font-size: 0.85rem; }
            .product-card .btn-add { font-size: 0.75rem; padding: 0.6rem 0.5rem; }
            .hero-logo { height: 100px; width: 100px; }
            .splash-img { height: 150px; width: 150px; }
            .splash-loader { width: 40px; height: 40px; }
            .logo-img-top { height: 30px; width: 30px; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    SPLASH SCREEN — 3 segundos
    ============================================================ -->
    <div id="splash">
        <div class="splash-content">
            <div class="splash-logo-wrapper">
                <!-- LOGO ESTÁTICO -->
                <img src="https://cdn.phototourl.com/free/2026-06-30-894a18ad-2214-4ace-ac1d-e14c8412f777.jpg" alt="SHEIBIS" class="splash-img" loading="lazy">
            </div>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- ============================================================
    FONDO PREMIUM
    ============================================================ -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="particle-grid"></div>

    <!-- ============================================================
    TOP BAR
    ============================================================ -->
    <header class="top-bar">
        <div class="logo-area">
            <div class="logo-wrapper">
                <!-- LOGO ESTÁTICO -->
                <img src="https://cdn.phototourl.com/free/2026-06-30-894a18ad-2214-4ace-ac1d-e14c8412f777.jpg" alt="SHEIBIS" class="logo-img-top" loading="lazy">
            </div>
        </div>
    </header>

    <!-- ============================================================
    HERO — con el logo centrado
    ============================================================ -->
    <section class="hero">
        <div class="hero-logo-wrapper">
            <!-- LOGO ESTÁTICO -->
            <img src="https://cdn.phototourl.com/free/2026-06-30-894a18ad-2214-4ace-ac1d-e14c8412f777.jpg" alt="SHEIBIS" class="hero-logo" loading="lazy">
        </div>
    </section>

    <!-- ============================================================
    CATEGORÍAS
    ============================================================ -->
    <div class="categories-bar" id="categoryBar">
        <a href="#" class="cat-item active" data-cat="todos"><i class="fas fa-th-large"></i> Todos</a>
        <a href="#" class="cat-item" data-cat="audifonos"><i class="fas fa-headphones"></i> Audífonos</a>
        <a href="#" class="cat-item" data-cat="bocinas"><i class="fas fa-volume-up"></i> Bocinas</a>
        <a href="#" class="cat-item" data-cat="camaras"><i class="fas fa-camera"></i> Cámaras</a>
        <a href="#" class="cat-item" data-cat="relojes"><i class="fas fa-clock"></i> Relojes</a>
        <a href="#" class="cat-item" data-cat="casos"><i class="fas fa-suitcase"></i> Cases</a>
    </div>

    <!-- ============================================================
    PRODUCT GRID
    ============================================================ -->
    <div class="product-grid" id="productGrid"></div>

    <!-- ============================================================
    FOOTER
    ============================================================ -->
    <footer class="footer">
        <p><i class="fas fa-heart"></i> Hecho con precisión para amantes de la tecnología</p>
        <p style="margin-top:0.5rem; font-size:0.7rem; opacity:0.15;">© 2026 SHEIBIS</p>
    </footer>

    <!-- ============================================================
    CARRITO FLOTANTE
    ============================================================ -->
    <button id="cartToggle" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span>
    </button>

    <div id="cart">
        <h3><i class="fas fa-crown"></i> Tu carrito</h3>
        <div id="cartItems"></div>
        <div class="cart-total">Total: Q<span id="cartTotal">0.00</span></div>
        <div class="cart-actions">
            <button class="btn btn-danger" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Vaciar</button>
            <button class="btn btn-primary" onclick="checkout()"><i class="fas fa-arrow-right"></i> Pagar</button>
        </div>
    </div>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        (function() {
            // ============================================================
            //  SPLASH — 3 segundos
            // ============================================================
            const splash = document.getElementById('splash');
            setTimeout(() => {
                splash.classList.add('hidden');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 3000);

            // ============================================================
            //  PRODUCTOS
            // ============================================================
            const products = [
                { id: 1, nombre: "Audífonos Pro X1", precio: 450, icono: "fa-headphones", categoria: "audifonos", desc: "Cancelación de ruido · 40h" },
                { id: 2, nombre: "Audífonos Ultra Bass", precio: 320, icono: "fa-headphones", categoria: "audifonos", desc: "Bajos profundos · 5.2" },
                { id: 3, nombre: "Audífonos Studio Pro", precio: 680, icono: "fa-headphones", categoria: "audifonos", desc: "Sonido envolvente · Pro" },
                { id: 4, nombre: "Audífonos Sports Fit", precio: 250, icono: "fa-headphones", categoria: "audifonos", desc: "Resistentes · deporte" },
                { id: 5, nombre: "Bocina BoomBox 360", precio: 580, icono: "fa-volume-up", categoria: "bocinas", desc: "Sonido 360° · resistente" },
                { id: 6, nombre: "Bocina Mini Plus", precio: 180, icono: "fa-volume-up", categoria: "bocinas", desc: "Portátil · 12h" },
                { id: 7, nombre: "Bocina Party Pro", precio: 890, icono: "fa-volume-up", categoria: "bocinas", desc: "100W · luces · karaoke" },
                { id: 8, nombre: "Bocina Smart Home", precio: 420, icono: "fa-volume-up", categoria: "bocinas", desc: "Asistente · WiFi" },
                { id: 9, nombre: "Cámara 4K Action", precio: 1200, icono: "fa-camera", categoria: "camaras", desc: "4K 60fps · estabilización" },
                { id: 10, nombre: "Cámara Web Pro", precio: 350, icono: "fa-camera", categoria: "camaras", desc: "4K · micrófono dual" },
                { id: 11, nombre: "Cámara Instantánea", precio: 280, icono: "fa-camera", categoria: "camaras", desc: "Impresión · filtros" },
                { id: 12, nombre: "Cámara 360°", precio: 1800, icono: "fa-camera", categoria: "camaras", desc: "5.7K · estabilización" },
                { id: 13, nombre: "SmartWatch Pro", precio: 850, icono: "fa-clock", categoria: "relojes", desc: "GPS · cardíaco · 7 días" },
                { id: 14, nombre: "SmartWatch Fit", precio: 420, icono: "fa-clock", categoria: "relojes", desc: "Deporte · 5 ATM" },
                { id: 15, nombre: "SmartWatch Classic", precio: 1200, icono: "fa-clock", categoria: "relojes", desc: "Acero · elegante" },
                { id: 16, nombre: "SmartWatch Kids", precio: 220, icono: "fa-clock", categoria: "relojes", desc: "GPS · llamadas" },
                { id: 17, nombre: "Case Premium Aluminio", precio: 180, icono: "fa-suitcase", categoria: "casos", desc: "Cierre magnético" },
                { id: 18, nombre: "Case Travel Pack", precio: 120, icono: "fa-suitcase", categoria: "casos", desc: "Portátil · cables" },
                { id: 19, nombre: "Case Waterproof", precio: 250, icono: "fa-suitcase", categoria: "casos", desc: "Resistente al agua" },
                { id: 20, nombre: "Case Carbon Fiber", precio: 320, icono: "fa-suitcase", categoria: "casos", desc: "Fibra · ultra ligero" },
            ];

            let cart = [];
            let currentFilter = 'todos';

            const grid = document.getElementById('productGrid');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const cartCountEl = document.getElementById('cartCount');
            const cartEl = document.getElementById('cart');
            const categoryLinks = document.querySelectorAll('.cat-item');

            function renderProducts(filter) {
                const filtered = filter === 'todos' ? products : products.filter(p => p.categoria === filter);
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card" data-id="${p.id}">
                        <div class="product-icon"><i class="fas ${p.icono}"></i></div>
                        <div class="product-name">${p.nombre}</div>
                        <div class="product-category">${p.desc}</div>
                        <div class="product-price">Q ${p.precio}</div>
                        <button class="btn-add" onclick="addToCart(${p.id})"><i class="fas fa-plus"></i> Agregar</button>
                    </div>
                `).join('');
            }

            function filterProducts(categoria) {
                currentFilter = categoria;
                renderProducts(categoria);
                categoryLinks.forEach(el => {
                    el.classList.remove('active');
                    if (el.dataset.cat === categoria) el.classList.add('active');
                });
            }

            window.addToCart = function(id) {
                const product = products.find(p => p.id === id);
                if (!product) return;
                const existing = cart.find(p => p.id === id);
                if (existing) existing.cantidad += 1;
                else cart.push({ ...product, cantidad: 1 });
                updateCartUI();
                const btn = document.querySelector(`.product-card[data-id="${id}"] .btn-add`);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Agregado';
                    btn.style.background = '#22c55e';
                    btn.style.color = '#fff';
                    setTimeout(() => {
                        btn.innerHTML = orig;
                        btn.style.background = 'var(--gold-gradient)';
                        btn.style.color = '#070b12';
                    }, 1200);
                }
            };

            window.removeFromCart = function(id) {
                cart = cart.filter(p => p.id !== id);
                updateCartUI();
            };

            window.toggleCart = function() {
                cartEl.classList.toggle('active');
            };

            window.clearCart = function() {
                cart = [];
                updateCartUI();
                cartEl.classList.remove('active');
            };

            window.checkout = function() {
                if (cart.length === 0) {
                    alert('🛒 Tu carrito está vacío');
                    return;
                }
                const total = cart.reduce((s, i) => s + (i.precio * i.cantidad), 0);
                alert(`✅ Pedido confirmado\nTotal: Q${total.toFixed(2)}\n¡Gracias por tu compra!`);
                clearCart();
            };

            function updateCartUI() {
                let total = 0, count = 0;
                if (cart.length === 0) {
                    cartItemsEl.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:1.2rem 0;">Carrito vacío</p>';
                } else {
                    cartItemsEl.innerHTML = cart.map(item => {
                        total += item.precio * item.cantidad;
                        count += item.cantidad;
                        return `
                            <div class="cart-item">
                                <div class="item-name">${item.nombre} x${item.cantidad}</div>
                                <div>
                                    <span class="item-price">Q${(item.precio * item.cantidad).toFixed(2)}</span>
                                    <button class="item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                cartTotalEl.textContent = total.toFixed(2);
                cartCountEl.textContent = count;
            }

            categoryLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const cat = this.dataset.cat;
                    filterProducts(cat);
                });
            });

            document.addEventListener('click', (e) => {
                const toggle = document.getElementById('cartToggle');
                if (cartEl.classList.contains('active') && !cartEl.contains(e.target) && !toggle.contains(e.target)) {
                    cartEl.classList.remove('active');
                }
            });

            renderProducts('todos');
            updateCartUI();
            document.querySelector('.cat-item[data-cat="todos"]')?.classList.add('active');

            console.log('✦ SHEIBIS — solo el logo circular, sin texto de imagen');
        })();
    </script>
</body>
</html>
</html>
