<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SHEIBIS · Todo a tu alcance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & BASE — FUTURISTA ULTRA PREMIUM
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #010208;
            --secondary: #0a0e1a;
            --gold: #ffd700;
            --gold-glow: #ffd700;
            --blue-neon: #00d4ff;
            --purple-neon: #b44dff;
            --pink-neon: #ff2d95;
            --white: #ffffff;
            --text-muted: #7a8ba8;
            --shadow-premium: 0 30px 80px -20px rgba(0, 0, 0, 0.9);
            --font-future: 'Orbitron', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--primary);
            font-family: var(--font-sans);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           FONDO DINÁMICO — NEÓN GALÁCTICO
           ============================================================ */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.06), transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.04), transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180, 77, 255, 0.03), transparent 60%),
                radial-gradient(ellipse at 0% 50%, rgba(255, 45, 149, 0.02), transparent 40%);
        }

        .bg-canvas .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(150px);
            animation: orbFloat 30s infinite alternate ease-in-out;
        }
        .orb-1 { width: 800px; height: 800px; top: -30%; left: -20%; background: radial-gradient(circle, rgba(0,212,255,0.08), transparent 70%); animation-duration: 35s; }
        .orb-2 { width: 700px; height: 700px; bottom: -30%; right: -20%; background: radial-gradient(circle, rgba(255,215,0,0.06), transparent 70%); animation-duration: 40s; }
        .orb-3 { width: 500px; height: 500px; top: 20%; left: 50%; background: radial-gradient(circle, rgba(180,77,255,0.05), transparent 70%); animation-duration: 25s; }
        .orb-4 { width: 400px; height: 400px; bottom: 10%; left: 10%; background: radial-gradient(circle, rgba(255,45,149,0.04), transparent 70%); animation-duration: 28s; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(80px, -60px) scale(1.2); } }

        .particle-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0,212,255,0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 60%, rgba(255,215,0,0.02) 1px, transparent 1px),
                radial-gradient(circle at 40% 90%, rgba(180,77,255,0.02) 1px, transparent 1px),
                radial-gradient(circle at 70% 30%, rgba(255,45,149,0.015) 1px, transparent 1px);
            background-size: 60px 60px, 80px 80px, 100px 100px, 70px 70px;
            pointer-events: none;
            animation: particleDrift 60s linear infinite;
        }
        @keyframes particleDrift { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 30px); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 12px; box-shadow: 0 0 20px rgba(255,215,0,0.3); }

        /* ============================================================
           SPLASH — ANIMACIÓN DE ENTRADA ÉPICA
           ============================================================ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        #splash.hidden { opacity: 0; transform: scale(1.08); pointer-events: none; }
        .splash-content { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: splashEntrance 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes splashEntrance { 
            0% { opacity: 0; transform: scale(0.3) rotate(-15deg); } 
            60% { transform: scale(1.08) rotate(2deg); opacity: 1; } 
            100% { transform: scale(1) rotate(0deg); opacity: 1; } 
        }
        .splash-img { 
            height: 300px; 
            width: 300px; 
            object-fit: cover; 
            object-position: center; 
            border-radius: 50%; 
            display: block; 
            box-shadow: 0 0 80px rgba(255,215,0,0.2), 0 0 160px rgba(0,212,255,0.1), 0 20px 60px rgba(0,0,0,0.6);
            animation: splashFloat 4s ease-in-out infinite, splashPulse 3s ease-in-out infinite;
        }
        @keyframes splashFloat { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-20px) scale(1.03); } }
        @keyframes splashPulse { 0%, 100% { box-shadow: 0 0 80px rgba(255,215,0,0.2), 0 0 160px rgba(0,212,255,0.1); } 50% { box-shadow: 0 0 120px rgba(255,215,0,0.3), 0 0 240px rgba(0,212,255,0.15); } }
        .splash-loader { margin-top: 2.5rem; width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.03); border-top: 2px solid var(--gold); border-right: 2px solid var(--blue-neon); animation: spinLoader 0.8s linear infinite; opacity: 0.6; }
        @keyframes spinLoader { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ============================================================
           TOP BAR — NEÓN FUTURISTA
           ============================================================ */
        .top-bar {
            background: rgba(1, 2, 8, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 0.7rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 0.5rem;
            box-shadow: 0 4px 40px rgba(0,0,0,0.4);
        }
        .cart-top-btn { 
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,212,255,0.15)); 
            color: var(--white); 
            border: 1px solid rgba(255,215,0,0.1); 
            padding: 10px 24px; 
            border-radius: 60px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.8rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.4s; 
            box-shadow: 0 4px 30px rgba(255,215,0,0.05);
            font-family: var(--font-future);
            letter-spacing: 1px;
        }
        .cart-top-btn:hover { 
            transform: scale(1.05) translateY(-2px); 
            border-color: var(--gold); 
            box-shadow: 0 8px 50px rgba(255,215,0,0.15); 
            background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(0,212,255,0.25));
        }
        .cart-top-btn i { color: var(--gold); }

        /* ============================================================
           HERO — LOGO GIGANTE CENTRADO
           ============================================================ */
        .hero-section {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .hero-logo-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: heroEntrance 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes heroEntrance {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            60% { transform: scale(1.02) rotate(1deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .hero-logo-wrapper {
            position: relative;
            display: inline-block;
            animation: logoHover 6s ease-in-out infinite;
        }

        @keyframes logoHover {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .hero-logo-wrapper::before {
            content: '';
            position: absolute;
            inset: -80px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(255,215,0,0.15) 10%,
                transparent 20%,
                rgba(0,212,255,0.15) 30%,
                transparent 40%,
                rgba(180,77,255,0.15) 50%,
                transparent 60%,
                rgba(255,45,149,0.15) 70%,
                transparent 80%,
                rgba(255,215,0,0.15) 90%,
                transparent 100%
            );
            animation: spinGlow 8s linear infinite;
            filter: blur(30px);
            z-index: -1;
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .hero-logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.05);
            animation: pulseRing 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        .hero-logo {
            height: 320px;
            width: 320px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            display: block;
            box-shadow: 
                0 0 60px rgba(255,215,0,0.1),
                0 0 120px rgba(0,212,255,0.05),
                0 30px 80px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .hero-logo:hover {
            transform: scale(1.04) rotate(-2deg);
            box-shadow: 
                0 0 100px rgba(255,215,0,0.2),
                0 0 200px rgba(0,212,255,0.1),
                0 40px 100px rgba(0,0,0,0.6);
        }

        .hero-title {
            margin-top: 2rem;
            font-family: var(--font-serif);
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #00d4ff, #b44dff, #ffd700);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientTitle 5s ease-in-out infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 60px rgba(255,215,0,0.05));
        }

        @keyframes gradientTitle {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-subtitle {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 0.5rem;
            letter-spacing: 6px;
            font-style: italic;
            animation: subtitlePulse 3s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; text-shadow: 0 0 40px rgba(255,215,0,0.05); }
        }

        .hero-slogan {
            margin-top: 0.5rem;
            font-family: var(--font-future);
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-muted);
            opacity: 0.2;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        .hero-scroll-indicator {
            margin-top: 3rem;
            animation: bounceArrow 2s ease-in-out infinite;
            color: var(--text-muted);
            opacity: 0.2;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @keyframes bounceArrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }

        .hero-scroll-indicator:hover {
            opacity: 0.6;
            color: var(--gold);
        }

        /* ============================================================
           CATÁLOGOS — 3D GLASS MORPH
           ============================================================ */
        .catalog-section { padding: 3.5rem 2rem; max-width: 1200px; margin: 0 auto; }
        .catalog-title { 
            font-family: var(--font-future); 
            font-size: 2.5rem; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 0.3rem; 
            background: linear-gradient(135deg, #ffd700, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
        }
        .catalog-subtitle { text-align: center; color: var(--text-muted); opacity: 0.3; margin-bottom: 2.5rem; font-size: 0.8rem; letter-spacing: 4px; font-weight: 300; font-family: var(--font-future); }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .catalog-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .catalog-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,212,255,0.1), rgba(180,77,255,0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .catalog-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.02), transparent, rgba(0,212,255,0.02), transparent);
            animation: rotateGlow 8s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .catalog-card:hover { transform: translateY(-12px) scale(1.02); border-color: rgba(255,215,0,0.2); box-shadow: 0 30px 60px -20px rgba(255,215,0,0.05), 0 0 60px rgba(255,215,0,0.02); }
        .catalog-card .catalog-image { width: 100%; height: 140px; object-fit: contain; border-radius: 12px; margin-bottom: 0.8rem; transition: 0.6s; filter: drop-shadow(0 4px 30px rgba(0,0,0,0.3)); animation: imageFloat 4s ease-in-out infinite; }
        @keyframes imageFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        .catalog-card:hover .catalog-image { transform: scale(1.05) translateY(-4px); }
        .catalog-card .catalog-icon { font-size: 3.5rem; color: var(--gold); opacity: 0.3; transition: 0.6s; display: block; margin-bottom: 0.5rem; }
        .catalog-card:hover .catalog-icon { opacity: 1; transform: scale(1.1) rotate(-5deg); text-shadow: 0 0 40px rgba(255,215,0,0.2); }
        .catalog-card .catalog-name { font-weight: 700; font-size: 1.1rem; color: var(--white); font-family: var(--font-future); letter-spacing: 1px; }
        .catalog-card .catalog-count { color: var(--text-muted); font-size: 0.7rem; opacity: 0.3; margin-top: 0.2rem; font-family: var(--font-future); }

        /* ============================================================
           PRODUCTOS — HOLOGRÁFICOS
           ============================================================ */
        .product-detail-section { padding: 2rem; max-width: 1200px; margin: 0 auto; display: none; }
        .product-detail-section.active { display: block; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .back-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.4s;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-future);
            letter-spacing: 1px;
        }
        .back-btn:hover { border-color: var(--gold); color: var(--white); background: rgba(255,215,0,0.05); box-shadow: 0 0 40px rgba(255,215,0,0.05); }

        .detail-title { 
            font-family: var(--font-future); 
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 1.5rem; 
            background: linear-gradient(135deg, #ffd700, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .product-list { display: flex; flex-direction: column; gap: 1.5rem; }

        .product-detail-item {
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            min-height: 180px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .product-detail-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,212,255,0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .product-detail-item:hover { border-color: rgba(255,215,0,0.1); transform: translateY(-6px) scale(1.005); box-shadow: 0 20px 60px -20px rgba(255,215,0,0.03); }

        .product-detail-image {
            flex: 0 0 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,215,0,0.02);
            padding: 0.5rem;
            transition: 0.6s;
            overflow: hidden;
            position: relative;
        }
        .product-detail-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.02), transparent);
            animation: scanLine 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scanLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .product-detail-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: 0.6s;
            max-height: 180px;
            filter: drop-shadow(0 4px 30px rgba(0,0,0,0.3));
            animation: hologramFloat 5s ease-in-out infinite;
        }
        @keyframes hologramFloat { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-4px) rotate(-1deg); } 75% { transform: translateY(4px) rotate(1deg); } }

        .product-detail-item:hover .product-detail-image img { transform: scale(1.08) rotate(-2deg); }
        .product-detail-image .icon-placeholder { font-size: 5rem; color: var(--gold); opacity: 0.15; }

        .product-detail-info {
            flex: 1;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .product-detail-name { font-weight: 700; font-size: 1.2rem; color: var(--white); margin-bottom: 0.3rem; font-family: var(--font-future); letter-spacing: 1px; }
        .product-detail-desc { color: var(--text-muted); font-size: 0.85rem; opacity: 0.5; margin-bottom: 0.5rem; }
        .product-detail-price { color: var(--gold); font-weight: 800; font-size: 1.4rem; margin-bottom: 0.6rem; text-shadow: 0 0 40px rgba(255,215,0,0.05); }

        .product-detail-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .qty-control-detail {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 0.15rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .qty-btn-detail {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn-detail:hover { background: rgba(255,215,0,0.05); color: var(--white); box-shadow: 0 0 30px rgba(255,215,0,0.05); }
        .qty-display-detail { min-width: 28px; text-align: center; font-weight: 600; color: var(--white); font-size: 1rem; font-family: var(--font-future); }

        .btn-add-detail {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,212,255,0.15));
            color: var(--white);
            border: 1px solid rgba(255,215,0,0.1);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: var(--font-future);
            letter-spacing: 1px;
        }
        .btn-add-detail:hover { transform: scale(1.03); border-color: var(--gold); box-shadow: 0 8px 40px rgba(255,215,0,0.1); background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(0,212,255,0.25)); }

            ];

            // ============================================================

            const catalogos = [
                { id: 'audifonos', nombre: 'Audífonos', icono: 'fa-headphones', imagen: 'https://cdn.phototourl.com/free/2026-06-30-ee27ce42-454e-4fb9-aaac-bb20b9548d3b.jpg' },
                { id: 'relojes', nombre: 'Smartwatches', icono: 'fa-clock' },

                { id: 'powerbanks', nombre: 'Power Banks', icono: 'fa-battery-full' },
                { id: 'bocinas', nombre: 'Bocinas', icono: 'fa-volume-up' },
                { id: 'camaras', nombre: 'Cámaras', icono: 'fa-camera' },
                { id: 'cables', nombre: 'Cables', icono: 'fa-plug' },
                { id: 'fundas', nombre: 'Fundas', icono: 'fa-mobile-alt' },

                { id: 'impresoras', nombre: 'Impresoras', icono: 'fa-print' },
            ];

            // ============================================================
            //  ESTADO

            let cart = [];
            let quantities = {};

            const cartCountEl = document.getElementById('cartCount');
            const cartEl = document.getElementById('cart');

            // ============================================================
            //  RENDER CATÁLOGOS
            // ============================================================
            function renderCatalogos() {
                catalogGrid.innerHTML = catalogos.map(cat => {
                    const count = products.filter(p => p.categoria === cat.id).length;
                    const hasImage = cat.imagen && cat.imagen !== '';
                    return `
                        <div class="catalog-card" onclick="openCatalog('${cat.id}')">

                    `;
                }).join('');
            }

                const cat = catalogos.find(c => c.id === categoriaId);
                if (!cat) return;

                const filtered = products.filter(p => p.categoria === categoriaId);
                detailTitle.textContent = cat.nombre;

                productList.innerHTML = filtered.map(p => {
                    const qty = quantities[p.id] || 1;
                    const hasImage = p.imagen && p.imagen !== '';
                    return `
                        <div class="product-detail-item" data-id="${p.id}">
                            <div class="product-detail-image">
                                ${hasImage ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">` : `<span class="icon-placeholder"><i class="fas ${p.icono}"></i></span>`}

                                        <span class="qty-display-detail" id="qty-detail-${p.id}">${qty}</span>
                                        <button class="qty-btn-detail" onclick="changeQtyDetail(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                                    </div>
                                    <button class="btn-add-detail" onclick="addToCartDetail(${p.id})"><i class="fas fa-plus"></i> Agregar</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                catalogSection.style.display = 'none';
                productDetailSection.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // ============================================================
            //  VOLVER A INICIO
            // ============================================================
            window.goHome = function() {
                catalogSection.style.display = 'block';
                productDetailSection.classList.remove('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // ============================================================
            //  CANTIDAD
            // ============================================================
            window.changeQtyDetail = function(id, delta) {
                if (!quantities[id]) quantities[id] = 1;
                quantities[id] = Math.max(1, quantities[id] + delta);
                const display = document.getElementById(`qty-detail-${id}`);
                if (display) display.textContent = quantities[id];
            };

            // ============================================================
            //  AGREGAR AL CARRITO
            // ============================================================
            window.addToCartDetail = function(id) {
                const product = products.find(p => p.id === id);
                if (!product) return;
                const qty = quantities[id] || 1;

                const existing = cart.find(p => p.id === id);
                if (existing) {
                    existing.cantidad += qty;
                } else {
                    cart.push({ ...product, cantidad: qty });
                }

                quantities[id] = 1;
                const display = document.getElementById(`qty-detail-${id}`);
                if (display) display.textContent = 1;

                updateCartUI();

                const btn = document.querySelector(`.product-detail-item[data-id="${id}"] .btn-add-detail`);
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Agregado';
                    btn.classList.add('added');
                    setTimeout(() => {
                        btn.innerHTML = orig;
                        btn.classList.remove('added');
                    }, 1500);
                }
            };

            // ============================================================
            //  CARRITO
            // ============================================================
            window.removeFromCart = function(id) {
                cart = cart.filter(p => p.id !== id);
                updateCartUI();
            };

            window.toggleCart = function() {
                cartEl.classList.toggle('active');
            };

            window.clearCart = function() {
                cart = [];
                updateCartUI();
                cartEl.classList.remove('active');
            };

            window.checkout = function() {
                if (cart.length === 0) {
                    alert('🛒 Tu carrito está vacío');
                    return;
                }
                const total = cart.reduce((s, i) => s + (i.precio * i.cantidad), 0);
                alert(`✅ Pedido confirmado\nTotal: Q${total.toFixed(2)}\n¡Gracias por tu compra!`);
                clearCart();
            };

            function updateCartUI() {
                let total = 0, count = 0;
                if (cart.length === 0) {
                    cartItemsEl.innerHTML = `
                        <div class="cart-empty">
                            <i class="fas fa-shopping-bag"></i>
                            <p>Tu carrito está vacío</p>
                        </div>
                    `;
                } else {
                    cartItemsEl.innerHTML = cart.map(item => {
                        total += item.precio * item.cantidad;
                        count += item.cantidad;
                        return `
                            <div class="cart-item">
                                <div class="item-name">${item.nombre} x${item.cantidad}</div>
                                <div>
                                    <span class="item-price">Q${(item.precio * item.cantidad).toFixed(2)}</span>
                                    <button class="item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                cartTotalEl.textContent = total.toFixed(2);
                cartCountEl.textContent = count;
            }

            // ============================================================
            //  CERRAR CARRITO
            // ============================================================
            document.addEventListener('click', (e) => {
                const toggle = document.querySelector('.cart-top-btn');
                if (cartEl.classList.contains('active') && !cartEl.contains(e.target) && !toggle.contains(e.target)) {
                    cartEl.classList.remove('active');
                }
            });

            // ============================================================
            //  INICIO
            // ============================================================
            renderCatalogos();
            updateCartUI();

            console.log('✦ SHEIBIS — Todo a tu alcance');
        })();
    </script>
</body>
</html>
